<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screamin Wheels and Blades</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: #FFE500;
            font-family: Poppins, sans-serif;
        }

        .page {
            max-width: 420px;
            margin: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .card {
            border: 2px solid #C03010;
            border-radius: 14px;
            overflow: hidden;
        }

        .banner {
            background: #FFF8C0;
            padding: 20px;
            text-align: center;
        }

        .banner img {
            max-width: 280px;
            width: 100%;
        }

        .profile {
            background: #D96010;
            padding: 25px;
            text-align: center;
            color: #FFD000;
        }

        .profile img {
            width: 120px;
            border-radius: 50%;
            background: #FFE500;
            padding: 6px;
        }

        .name {
            font-size: 24px;
            font-weight: 800;
            margin-top: 10px;
        }

        .tag {
            font-style: italic;
        }

        .buttons {
            background: #E89010;
            padding: 10px;
            border-radius: 14px;
            border: 2px solid #C03010;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .icon-btn {
            background: #F5A820;
            border: 2px solid #B03008;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            text-decoration: none;
            font-size: 12px;
            font-weight: 700;
            color: #1a0000;
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: center;
        }

        .icon-btn:active {
            transform: scale(.95);
        }

        .circle {
            width: 50px;
            height: 50px;
            background: #C85500;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #8B2000;
        }

        .badge {
            background: #FFF8C0;
            padding: 20px;
            text-align: center;
            border-radius: 14px;
            border: 2px solid #C03010;
            font-weight: 600;
            color: #C03010;
        }
    </style>
</head>

<body>
    <div class="page">
        <div class="card banner">
            <img src="https://digital-ecocards.com/wp-content/uploads/2024/04/11horizontal-removebg-preview.png">
        </div>
        <div class="card profile">
            <img src="https://digital-ecocards.com/wp-content/uploads/2024/04/Loogo.png">
            <div class="name">
                Screamin' Wheels and Blades
            </div>
            <div class="tag">
                Roller-Skating Rink
            </div>
        </div>
        <div class="buttons">
            <a href="tel:+17049075359" class="icon-btn">
                <div class="circle">📞</div>
                Phone
            </a>
            <a href="mailto:swb7@screaminwheelsblades.com" class="icon-btn">
                <div class="circle">✉️</div>
                Email
            </a>
            <a href="https://www.screaminwheelsblades.com/" target="_blank" class="icon-btn">
                <div class="circle">🌐</div>
                Website
            </a>
            <a href="https://www.facebook.com/screaminwheels.and.blades/" target="_blank" class="icon-btn">
                <div class="circle">f</div>
                Facebook
            </a>
            <a href="https://www.instagram.com/popupandroll/" target="_blank" class="icon-btn">
                <div class="circle">📷</div>
                Instagram
            </a>
            <a href="https://digital-ecocards.com/wp-content/uploads/2024/04/contacts.vcf" download="contacts.vcf"
                type="text/vcard" class="icon-btn">
                <div class=" circle">＋
                </div>
                Add Contact
            </a>

        </div>
        <div class="badge">
            Charlotte's 1st Female Black Owned<br>
            Mobile Roller Rink<br>
            Poppin Up in a City near YOU!
        </div>
    </div>
</body>

</html>
